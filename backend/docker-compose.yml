version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nossagrana-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nossagrana}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nossagrana_dev_local}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: