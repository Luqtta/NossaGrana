spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/nossagrana}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: false
  sql:
    init:
      mode: never

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000
  refresh-expiration: 2592000000

brevo:
  api-key: ${BREVO_API_KEY}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    com.nossagrana: INFO
